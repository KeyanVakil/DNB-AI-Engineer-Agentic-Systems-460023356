[pytest]
minversion = 7.0
testpaths = tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
filterwarnings =
    error
    ignore::DeprecationWarning:pydantic.*
    ignore::DeprecationWarning:langchain.*
markers =
    integration: integration tests that hit Postgres and MCP servers
    e2e: end-to-end tests that require the full docker compose stack
    drift: drift detection tests that require time-window fixtures
    eval: evaluation-harness tests
    slow: tests that take more than a few seconds
addopts =
    -ra
    --strict-markers
    --strict-config
    --tb=short
    -p no:cacheprovider
