services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: finsight
      POSTGRES_PASSWORD: finsight
      POSTGRES_DB: finsight
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finsight"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sleep 5
        ollama pull llama3.1:8b
        ollama pull nomic-embed-text
    environment:
      OLLAMA_HOST: http://ollama:11434
    volumes:
      - ollama_data:/root/.ollama

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.0
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  otel-collector:
    image: otel/opentelemetry-collector:0.108.0
    volumes:
      - ./configs/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    depends_on:
      - jaeger
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:1.60
    ports:
      - "16686:16686"
      - "14317:4317"

  prometheus:
    image: prom/prometheus:v2.54.0
    volumes:
      - ./configs/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./configs/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./configs/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  customer-mcp:
    build: .
    command: python -m app.mcp.servers.customer
    environment:
      DATABASE_URL: postgresql+asyncpg://finsight:finsight@postgres:5432/finsight
    ports:
      - "7001:7001"
    depends_on:
      postgres:
        condition: service_healthy

  market-mcp:
    build: .
    command: python -m app.mcp.servers.market
    environment:
      DATABASE_URL: postgresql+asyncpg://finsight:finsight@postgres:5432/finsight
    ports:
      - "7002:7002"
    depends_on:
      postgres:
        condition: service_healthy

  compliance-mcp:
    build: .
    command: python -m app.mcp.servers.compliance
    environment:
      DATABASE_URL: postgresql+asyncpg://finsight:finsight@postgres:5432/finsight
    ports:
      - "7003:7003"
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build: .
    command: honcho start
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://finsight:finsight@postgres:5432/finsight
      CUSTOMER_MCP_URL: http://customer-mcp:7001
      MARKET_MCP_URL: http://market-mcp:7002
      COMPLIANCE_MCP_URL: http://compliance-mcp:7003
      OLLAMA_BASE_URL: http://ollama:11434
      MLFLOW_TRACKING_URI: http://mlflow:5000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "8000:8000"
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy

  drift-monitor:
    build: .
    command: python -c "import asyncio; from app.drift.monitor import run_loop; asyncio.run(run_loop(300))"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://finsight:finsight@postgres:5432/finsight
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  ollama_data:
  mlflow_data:
